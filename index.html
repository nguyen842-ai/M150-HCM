<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo KAE - Google Sheet</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; color: #333; display: flex; height: 100vh; overflow: hidden; }
        
        /* HEADER & HAMBURGER MENU */
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; align-items: center; padding: 0 20px; z-index: 100; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: #5f6368; padding: 10px; margin-right: 15px; border-radius: 50%; transition: background 0.2s; }
        .menu-btn:hover { background-color: #f1f3f4; }
        .app-title { font-size: 1.2rem; font-weight: 600; color: #1e3a8a; }

        /* SIDEBAR (Khung nhập liệu) */
        .sidebar { width: 320px; background-color: #f8fafc; border-right: 1px solid #e2e8f0; padding: 80px 20px 20px; transition: transform 0.3s ease; flex-shrink: 0; overflow-y: auto; height: 100%; }
        .sidebar.collapsed { transform: translateX(-100%); position: absolute; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; color: #334155; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .form-group input[readonly] { background-color: #e2e8f0; color: #475569; font-weight: bold; cursor: not-allowed; }
        
        button.submit-btn { width: 100%; padding: 12px; background-color: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        button.submit-btn:hover { background-color: #1d4ed8; }
        button.submit-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 80px 20px 20px; overflow-y: auto; background-color: white; transition: margin-left 0.3s ease; }
        
        .action-bar { display: flex; justify-content: flex-end; margin-bottom: 15px; gap: 10px; }
        .download-btn { padding: 8px 16px; background-color: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; font-size: 0.9rem; transition: 0.2s;}
        .download-btn:hover { background-color: #059669; }

        /* TABLE */
        .table-container { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        thead th { background-color: #fce4d6; color: #1e293b; position: sticky; top: 0; }
        .delete-btn { background-color: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .delete-btn:hover { background-color: #dc2626; }
        
        /* Loading Text */
        .loading-text { font-size: 0.85rem; color: #d97706; font-style: italic; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="menu-btn" onclick="toggleSidebar()" title="Ẩn/Hiện Menu">☰</button>
        <div class="app-title">M150-Team HCM</div>
    </div>

    <div class="sidebar" id="sidebar">
        <h2 style="font-size: 1.1rem; color: #1e3a8a; margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px;">Nhập Dữ Liệu Báo Cáo</h2>
        
        <form id="data-form">
            <div class="form-group">
                <label>Ngày báo cáo:</label>
                <input type="date" id="input-date" required>
            </div>

            <div class="form-group">
                <label>Tên nhân viên:</label>
                <select id="input-staff" required onchange="updateTotalCustomer()">
                    <option value="" disabled selected>⏳ Đang tải dữ liệu...</option>
                </select>
                <div id="loading-staff" class="loading-text">Đang đồng bộ danh sách nhân viên...</div>
            </div>

            <div class="form-group">
                <label>Tổng DSKH:</label>
                <input type="text" id="input-total-dskh" readonly placeholder="...">
            </div>

            <div class="form-group">
                <label style="color: #059669;">Vui lòng nhập số lượng khách hàng đã lên đơn hôm nay:</label>
                <input type="number" id="input-orders" min="0" required placeholder="Ví dụ: 5">
            </div>

            <button type="submit" class="submit-btn" id="btn-submit">Gửi Báo Cáo</button>
        </form>
    </div>

    <div class="main-content">
        <div class="action-bar">
            <a href="https://docs.google.com/spreadsheets/d/1_CNS-FMoALUYYwGU5Tt3SyKuc5xkotYi08QA-lwsyRA/export?format=xlsx" class="download-btn" target="_blank">
                📥 Tải File Excel Tự Động
            </a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Ngày</th>
                        <th>Nhân Viên</th>
                        <th>Tổng DSKH</th>
                        <th>SL Lên Đơn</th>
                        <th>Thao Tác</th>
                    </tr>
                </thead>
                <tbody id="preview-table">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH API LINK ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbxlfNvQ5ZgV3z5MfiKMqvfJDwCNTUE7-ODYEDptwe6RHU_vB-KpzxPUpS04RGL8rj0/exec';

        // Set mặc định ngày hôm nay
        document.getElementById('input-date').valueAsDate = new Date();

        // Ẩn/Hiện Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        // Tự động tải danh sách nhân viên khi mở web
        window.onload = function() {
            const loadingText = document.getElementById('loading-staff');
            loadingText.style.display = 'block';

            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    const selectEl = document.getElementById('input-staff');
                    selectEl.innerHTML = '<option value="" disabled selected>-- Chọn nhân viên --</option>';
                    
                    if(data.length === 0) {
                        selectEl.innerHTML = '<option value="" disabled selected>Chưa có data trong Sheet</option>';
                        return;
                    }

                    data.forEach(emp => {
                        const option = document.createElement('option');
                        option.value = emp.name;
                        option.setAttribute('data-dskh', emp.dskh);
                        option.innerText = emp.name;
                        selectEl.appendChild(option);
                    });
                })
                .catch(err => {
                    console.error('Lỗi khi tải dữ liệu:', err);
                    document.getElementById('input-staff').innerHTML = '<option value="" disabled selected>⚠️ Lỗi kết nối Google Sheet</option>';
                })
                .finally(() => {
                    loadingText.style.display = 'none';
                });
        };

        // Tự động cập nhật Tổng DSKH
        function updateTotalCustomer() {
            const selectEl = document.getElementById('input-staff');
            const selectedOption = selectEl.options[selectEl.selectedIndex];
            const dskh = selectedOption.getAttribute('data-dskh');
            document.getElementById('input-total-dskh').value = dskh ? dskh : "";
        }

        // Xử lý gửi báo cáo lên Google Sheet
        document.getElementById('data-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerText = '⏳ Đang gửi lên Google Sheet...';
            btnSubmit.disabled = true;

            const payload = {
                action: 'add',
                date: document.getElementById('input-date').value,
                staff: document.getElementById('input-staff').value,
                dskh: document.getElementById('input-total-dskh').value,
                orders: document.getElementById('input-orders').value
            };

            // Gửi qua Fetch API (dùng text/plain để tránh lỗi CORS của Google)
            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(res => {
                // Thêm dòng mới vào bảng Preview
                const tbody = document.getElementById('preview-table');
                const newRow = `<tr>
                    <td>${payload.date}</td>
                    <td>${payload.staff}</td>
                    <td>${payload.dskh}</td>
                    <td style="font-weight: bold; color: #059669;">${payload.orders}</td>
                    <td><button class="delete-btn" onclick="requestDelete(this, '${payload.date}', '${payload.staff}')">Yêu cầu xóa</button></td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', newRow);

                // Reset ô nhập
                document.getElementById('input-orders').value = '';
                alert("✅ Đã ghi dữ liệu thành công vào Google Sheet!");
            })
            .catch(err => {
                console.error(err);
                // Vì Google Apps Script đôi khi chặn phản hồi no-cors, dù dữ liệu đã ghi thành công
                alert("Đã gửi lệnh. Vui lòng kiểm tra lại trên Google Sheet để chắc chắn dữ liệu đã vào.");
            })
            .finally(() => {
                btnSubmit.innerText = 'Gửi Báo Cáo';
                btnSubmit.disabled = false;
            });
        });

        // Xử lý nút yêu cầu xóa
        function requestDelete(btn, date, staff) {
            if(confirm(`Bạn có chắc chắn muốn yêu cầu xóa báo cáo của ${staff} ngày ${date}?`)) {
                btn.innerText = '⏳ Đang gửi yêu cầu...';
                btn.disabled = true;
                btn.style.backgroundColor = '#94a3b8';

                const payload = { action: 'delete', date: date, staff: staff };

                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                }).then(() => {
                    const row = btn.closest('tr');
                    row.style.opacity = '0.5';
                    row.style.backgroundColor = '#fee2e2';
                    btn.innerText = 'Đã gửi yêu cầu xóa';
                }).catch(() => {
                    alert('Gửi yêu cầu thất bại. Vui lòng thử lại!');
                    btn.innerText = 'Yêu cầu xóa';
                    btn.disabled = false;
                    btn.style.backgroundColor = '#ef4444';
                });
            }
        }
    </script>
</body>
</html>
